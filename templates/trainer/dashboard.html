<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>수업콕 — 강사 대시보드</title>
  <meta name="description" content="수업콕 강사 대시보드 — 슬롯 관리, 회원 관리, 예약 현황" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9386074895373296" crossorigin="anonymous"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand:   { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5' },
            emerald: { DEFAULT: '#10b981', light: '#34d399', dark: '#059669' },
            slot:    { open: '#10b981', reserved: '#6366f1', closed: '#374151' },
          },
          animation: {
            'fade-in':    'fadeIn 0.3s ease',
            'slide-up':   'slideUp 0.35s ease',
            'pulse-soft': 'pulseSoft 2s infinite',
          },
          keyframes: {
            fadeIn:    { from: { opacity: 0 },           to: { opacity: 1 } },
            slideUp:   { from: { opacity: 0, transform: 'translateY(12px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            pulseSoft: { '0%,100%': { opacity: 1 }, '50%': { opacity: 0.6 } },
          },
        },
      },
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }

    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(99, 102, 241, 0.15);
    }
    .tab-btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
      color: #94a3b8;
      border: 1px solid transparent;
      white-space: nowrap;
      word-break: keep-all;
    }
    .tab-btn.active {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.4);
      color: #818cf8;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .slot-cell {
      min-height: 40px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s cubic-bezier(.4,0,.2,1);
      font-size: 0.7rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    .slot-cell.inactive {
      background: #1e293b;
      border: 1px dashed #334155;
      color: #475569;
    }
    .slot-cell.inactive:hover {
      background: rgba(16, 185, 129, 0.08);
      border-color: #10b981;
      color: #10b981;
    }
    .slot-cell.available {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.4);
      color: #34d399;
    }
    .slot-cell.available:hover {
      background: rgba(16, 185, 129, 0.25);
    }
    .slot-cell.reserved {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.4);
      color: #818cf8;
      cursor: not-allowed;
    }
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .modal-box {
      background: #1e293b;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 16px;
      padding: 28px;
      width: calc(100% - 32px);
      max-width: 420px;
      animation: slideUp 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-sm-green {
      background: rgba(16,185,129,0.15);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sm-green:hover { background: rgba(16,185,129,0.25); }
    .dur-btn {
      padding: 5px 12px;
      border-radius: 8px;
      border: 1.5px solid #334155;
      background: rgba(15,23,42,0.6);
      color: #64748b;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .dur-btn:hover   { border-color: #6366f1; color: #818cf8; }
    .dur-btn.dur-active { border-color: #6366f1; background: rgba(99,102,241,0.15); color: #818cf8; }
    input[type="text"], input[type="tel"], input[type="number"] {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.875rem;
      width: 100%;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    label { font-size: 0.78rem; color: #94a3b8; margin-bottom: 4px; display: block; font-weight: 500; }
    .badge {
      display: inline-block;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.68rem;
      font-weight: 700;
    }
    .badge-green { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
    .badge-purple { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
    .badge-gray   { background: rgba(71,85,105,0.3); color: #94a3b8; border: 1px solid #334155; }
    .badge-red    { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid rgba(99,102,241,0.3);
      border-radius: 12px; padding: 12px 20px; z-index: 100;
      font-size: 0.85rem; font-weight: 500; color: #e2e8f0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideUp 0.3s ease;
      white-space: nowrap;
    }
  </style>
</head>
<body class="min-h-screen">

<!-- ── HEADER ───────────────────────────────────────────────────── -->
<header class="glass sticky top-0 z-40 px-3 py-3 flex items-center justify-between gap-2">
  <div class="flex items-center gap-2 shrink overflow-hidden">
    <div class="w-8 h-8 shrink-0 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">콕</div>
    <div class="shrink overflow-hidden">
      <p class="text-xs text-slate-400 leading-none">수업콕</p>
      <p class="text-sm font-bold leading-tight truncate break-keep" style="word-break: keep-all;">{{ trainer.name }} 강사 대시보드</p>
    </div>
  </div>
  <div class="flex items-center gap-1.5 shrink-0">
    <button id="copyLinkBtn" onclick="copyLink()" class="text-[11px] whitespace-nowrap text-indigo-400 font-semibold border border-indigo-500/30 rounded-lg px-2.5 py-1.5 hover:bg-indigo-500/10 transition-all">
      📋 링크 복사
    </button>
    <a href="/trainer/logout" class="text-[11px] whitespace-nowrap text-slate-400 font-semibold border border-slate-600 rounded-lg px-2.5 py-1.5 hover:bg-slate-700 transition-all" style="text-decoration:none;">로그아웃</a>
  </div>
</header>

<!-- ── TABS ──────────────────────────────────────────────────────── -->
<div class="sticky top-[56px] z-30 glass border-t border-slate-700/50 px-3 py-2 flex gap-1.5 overflow-x-auto hide-scrollbar">
  <button class="tab-btn active shrink-0" id="tab-calendar" onclick="switchTab('calendar')">📅 캘린더</button>
  <button class="tab-btn shrink-0" id="tab-members"  onclick="switchTab('members')">👥 회원 관리</button>
  <button class="tab-btn shrink-0" id="tab-reservations" onclick="switchTab('reservations')">📋 예약 현황</button>
</div>

<main class="max-w-xl mx-auto px-4 py-5 space-y-4">

  <!-- ══ TAB: CALENDAR ══════════════════════════════════════════════ -->
  <section id="panel-calendar" class="animate-fade-in">

    <!-- Legend -->
    <div class="flex items-center gap-3 mb-3 text-xs">
      <span class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:3px;background:rgba(16,185,129,0.25);border:1px solid rgba(16,185,129,0.5);display:inline-block;"></span>예약 가능</span>
      <span class="flex items-center gap-1.5"><span style="width:10px;height:10px;border-radius:3px;background:rgba(99,102,241,0.25);border:1px solid rgba(99,102,241,0.5);display:inline-block;"></span>예약 확정</span>
      <span style="color:#64748b;">· 각 요일의 [+]로 슬롯 추가</span>
    </div>

    <div id="calendarContainer" class="space-y-4"></div>
  </section>

  <!-- ══ TAB: MEMBERS ══════════════════════════════════════════════ -->
  <section id="panel-members" class="hidden animate-fade-in space-y-4">

    <div class="flex items-center justify-between">
      <h2 class="text-base font-bold">회원 목록</h2>
      <button onclick="openAddMemberModal()" class="btn-primary text-xs px-3 py-2">+ 회원 등록</button>
    </div>

    <div id="membersContainer" class="space-y-3"></div>
  </section>

  <!-- ══ TAB: RESERVATIONS ═════════════════════════════════════════ -->
  <section id="panel-reservations" class="hidden animate-fade-in space-y-4">
    <h2 class="text-base font-bold">예약 현황</h2>
    <div class="space-y-2">
      <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">📌 다가오는 예약</p>
      <div id="upcomingContainer" class="space-y-2"></div>
    </div>
    <div class="space-y-2 mt-4">
      <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">✅ 지난 예약</p>
      <div id="pastContainer" class="space-y-2"></div>
    </div>
  </section>

</main>

<!-- ══ MODALS ════════════════════════════════════════════════════ -->

<!-- Add Member Modal -->
<div id="addMemberModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 class="text-base font-bold mb-4">신규 회원 등록</h3>
    <div class="space-y-3">
      <div><label>이름</label><input type="text" id="newMemberName" placeholder="홍길동" /></div>
      <div><label>전화번호</label><input type="tel" id="newMemberPhone" placeholder="010-0000-0000" oninput="autoHyphen(this)" /></div>
      <div><label>총 세션 횟수</label><input type="number" id="newMemberTotal" value="10" min="1" max="200" /></div>
      <div><label>사용 횟수 (기초값)</label><input type="number" id="newMemberUsed" value="0" min="0" /></div>
    </div>
    <div class="flex gap-2 mt-5">
      <button onclick="closeModal('addMemberModal')" class="flex-1 py-2.5 rounded-lg border border-slate-600 text-sm text-slate-400 hover:bg-slate-700 transition-all">취소</button>
      <button onclick="submitNewMember()" class="flex-1 btn-primary">등록</button>
    </div>
  </div>
</div>

<!-- Edit Member Modal -->
<div id="editMemberModal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 class="text-base font-bold mb-4">회원 정보 수정</h3>
    <input type="hidden" id="editMemberId" />
    <div class="space-y-3">
      <div><label>이름</label><input type="text" id="editMemberName" /></div>
      <div><label>전화번호</label><input type="tel" id="editMemberPhone" oninput="autoHyphen(this)" /></div>
      <div><label>총 세션 횟수</label><input type="number" id="editMemberTotal" min="1" /></div>
      <div><label>사용 횟수</label><input type="number" id="editMemberUsed" min="0" /></div>
    </div>
    <div class="flex gap-2 mt-5">
      <button onclick="closeModal('editMemberModal')" class="flex-1 py-2.5 rounded-lg border border-slate-600 text-sm text-slate-400 hover:bg-slate-700 transition-all">취소</button>
      <button onclick="submitEditMember()" class="flex-1 btn-primary">저장</button>
    </div>
  </div>
</div>

<!-- Add Slot Modal -->
<div id="addSlotModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:1.8rem;margin-bottom:4px;">📅</div>
      <h3 style="font-size:1rem;font-weight:800;color:#f1f5f9;">슬롯 추가</h3>
      <p style="font-size:0.8rem;color:#94a3b8;margin-top:2px;" id="addSlotDayLabel"></p>
    </div>

    <!-- 시작 시간 -->
    <div style="margin-bottom:14px;">
      <label style="font-size:0.8rem;color:#94a3b8;display:block;margin-bottom:8px;font-weight:600;">시작 시간</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="text" inputmode="numeric" id="slotHour" placeholder="HH"
          maxlength="2"
          style="width:64px;text-align:center;font-size:1.3rem;font-weight:800;" />
        <span style="font-size:1.3rem;color:#64748b;font-weight:300;">:</span>
        <input type="text" inputmode="numeric" id="slotMinute" placeholder="MM"
          maxlength="2"
          style="width:64px;text-align:center;font-size:1.3rem;font-weight:800;" />
        <span style="font-size:0.8rem;color:#64748b;">시 분</span>
      </div>
    </div>

    <!-- 수업 시간 -->
    <div style="margin-bottom:20px;">
      <label style="font-size:0.8rem;color:#94a3b8;display:block;margin-bottom:8px;font-weight:600;">수업 시간</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;" id="durationBtns">
        <button onclick="selectDur(this,30)"  data-dur="30"  class="dur-btn">30분</button>
        <button onclick="selectDur(this,50)"  data-dur="50"  class="dur-btn">50분</button>
        <button onclick="selectDur(this,60)"  data-dur="60"  class="dur-btn dur-active">60분</button>
        <button onclick="selectDur(this,0)"   data-dur="0"   class="dur-btn">직접입력</button>
      </div>
      <input type="number" id="customDurInput" placeholder="분 입력" min="1" max="300"
        style="display:none;width:100%;margin-top:8px;" />
    </div>

    <input type="hidden" id="addSlotDateStr" />
    <div class="flex gap-2">
      <button onclick="closeModal('addSlotModal')" class="flex-1 py-2.5 rounded-lg border border-slate-600 text-sm text-slate-400 hover:bg-slate-700 transition-all">취소</button>
      <button id="addSlotBtn" onclick="submitAddSlot()" class="flex-1 btn-primary">추가</button>
    </div>
  </div>
</div>

<!-- Session Adjust Modal -->
<div id="adjustModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:1.8rem;margin-bottom:4px;" id="adjustIcon"></div>
      <h3 style="font-size:1rem;font-weight:800;color:#f1f5f9;" id="adjustTitle"></h3>
    </div>

    <!-- 회원정보 + 효수 변화 -->
    <div style="background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.2);border-radius:12px;padding:12px 16px;margin-bottom:14px;">
      <p style="font-size:0.82rem;color:#94a3b8;margin-bottom:2px;">회원</p>
      <p style="font-weight:700;font-size:0.95rem;" id="adjustMemberName"></p>
      <p style="font-size:0.82rem;color:#94a3b8;margin-top:8px;margin-bottom:4px;">회수 변화</p>
      <p style="font-weight:800;font-size:1.05rem;" id="adjustCountPreview"></p>
    </div>

    <!-- 사유 입력 -->
    <div style="margin-bottom:18px;">
      <label style="font-size:0.8rem;color:#94a3b8;display:block;margin-bottom:6px;font-weight:600;">조정 사유 <span style="color:#64748b;font-weight:400;">(선택)</span></label>
      <textarea id="adjustReason" rows="2"
        placeholder="예) 예약 없이 수업 진행 / 취소 오류 복구"
        style="width:100%;background:rgba(15,23,42,0.8);border:1.5px solid #334155;border-radius:10px;padding:10px 12px;color:#e2e8f0;font-size:0.83rem;resize:none;outline:none;font-family:inherit;transition:border-color 0.2s;"
        onfocus="this.style.borderColor='#6366f1'"
        onblur="this.style.borderColor='#334155'"
      ></textarea>
    </div>

    <input type="hidden" id="adjustMemberId" />
    <input type="hidden" id="adjustDelta" />
    <div class="flex gap-2">
      <button onclick="closeModal('adjustModal')" class="flex-1 py-2.5 rounded-lg border border-slate-600 text-sm text-slate-400 hover:bg-slate-700 transition-all">안할게요</button>
      <button id="adjustConfirmBtn" onclick="submitAdjustSession()" class="flex-1 btn-primary">확인</button>
    </div>
  </div>
</div>

<!-- Cancel Reservation Modal (강사용) -->
<div id="cancelResModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:2rem;margin-bottom:6px;">❌</div>
      <h3 style="font-size:1rem;font-weight:800;color:#f1f5f9;">예약 취소</h3>
    </div>

    <!-- 예약 정보 -->
    <div style="background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:12px 14px;margin-bottom:14px;">
      <p style="font-size:0.82rem;color:#94a3b8;margin-bottom:2px;">예약자</p>
      <p style="font-weight:700;font-size:0.95rem;" id="cancelMemberName"></p>
      <p style="font-size:0.82rem;color:#94a3b8;margin-top:6px;margin-bottom:2px;">수업 일시</p>
      <p style="font-weight:700;font-size:0.95rem;" id="cancelSlotDate"></p>
    </div>

    <!-- 취소 사유 입력 -->
    <div style="margin-bottom:14px;">
      <label style="font-size:0.8rem;color:#94a3b8;display:block;margin-bottom:6px;font-weight:600;">취소 사유 <span style="color:#64748b;font-weight:400;">(선택)</span></label>
      <textarea id="cancelReasonInput" rows="3"
        placeholder="예) 개인 사정으로 인한 취소입니다. 다음 수업 때 연락드리겠습니다."
        style="width:100%;background:rgba(15,23,42,0.8);border:1.5px solid #334155;border-radius:10px;padding:10px 12px;color:#e2e8f0;font-size:0.83rem;resize:none;outline:none;font-family:inherit;transition:border-color 0.2s;"
        onfocus="this.style.borderColor='#6366f1'"
        onblur="this.style.borderColor='#334155'"
      ></textarea>
      <p style="font-size:0.72rem;color:#475569;margin-top:4px;">&#8203;사유는 회원의 예약 내역에 표시됩니다.</p>
    </div>

    <!-- 슬롯 재오픈 선택 -->
    <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.2);border-radius:12px;margin-bottom:18px;cursor:pointer;">
      <input type="checkbox" id="reopenSlotCheck" checked
        style="width:16px;height:16px;accent-color:#6366f1;cursor:pointer;" />
      <span style="font-size:0.82rem;color:#c7d2fe;">
        해당 시간을 다시 <strong>예약 가능</strong>으로 열어두기
        <span style="display:block;font-size:0.72rem;color:#64748b;margin-top:1px;">체크 해제 → 슬롯을 완전히 닫습니다</span>
      </span>
    </label>

    <input type="hidden" id="cancelResId" />
    <div class="flex gap-2">
      <button onclick="closeModal('cancelResModal')" class="flex-1 py-2.5 rounded-lg border border-slate-600 text-sm text-slate-400 hover:bg-slate-700 transition-all">닫기</button>
      <button id="trainerCancelBtn" onclick="submitTrainerCancel()" class="flex-1 py-2.5 rounded-lg font-bold text-sm text-white transition-all" style="background:linear-gradient(135deg,#ef4444,#dc2626);">취소 확정</button>
    </div>
  </div>
</div>

<script>
const TRAINER = {{ trainer | tojson }};
const TRAINER_ID = TRAINER.id;
const SLUG = TRAINER.custom_slug;

let slotsMap       = {};  // slot id → slot object
let reservationMap = {};  // slot_datetime → reservation object (active only)

// ── TAB SWITCHING ──────────────────────────────────────────────
function switchTab(name) {
  ['calendar','members','reservations'].forEach(t => {
    document.getElementById('panel-' + t).classList.add('hidden');
    document.getElementById('tab-' + t).classList.remove('active');
  });
  document.getElementById('panel-' + name).classList.remove('hidden');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'members')      loadMembers();
  if (name === 'reservations') loadReservations();
}

// ── TOAST ──────────────────────────────────────────────────────
function showToast(msg, color = '#818cf8') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderColor = color + '60';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

// ── COPY LINK ──────────────────────────────────────────────────
function copyLink() {
  const url = `${location.origin}/r/${SLUG}`;
  navigator.clipboard.writeText(url).then(() => showToast('📋 링크가 복사되었습니다!'));
}

// ── CALENDAR ──────────────────────────────────────────────────
function getWeekDays(startOffset) {
  const days = [];
  const now = new Date();
  // Find this Monday
  const dayOfWeek = now.getDay() === 0 ? 6 : now.getDay() - 1;
  const monday = new Date(now);
  monday.setDate(now.getDate() - dayOfWeek + startOffset * 7);
  monday.setHours(0,0,0,0);
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

const DAY_KO = ['월','화','수','목','금','토','일'];

function pad(n) { return String(n).padStart(2,'0'); }

async function loadCalendar() {
  const [slotsRes, resRes] = await Promise.all([
    fetch(`/api/slots/${TRAINER_ID}`),
    fetch(`/api/reservations/${TRAINER_ID}`),
  ]);
  const slots  = await slotsRes.json();
  const allRes = await resRes.json();

  // slotsMap: id → slot
  slotsMap = {};
  slots.forEach(s => { slotsMap[s.id] = s; });

  // reservationMap: slot_datetime → reservation (active upcoming)
  reservationMap = {};
  const now = new Date();
  allRes
    .filter(r => r.status === 'active' && new Date(r.slot_datetime) >= now)
    .forEach(r => { reservationMap[r.slot_datetime] = r; });

  renderCalendar();
}

function renderCalendar() {
  const container = document.getElementById('calendarContainer');
  container.innerHTML = '';

  // date → [slot, ...] 인덱스 생성
  const slotsByDate = {};
  Object.values(slotsMap).forEach(s => {
    const dateKey = s.slot_datetime.substring(0, 10);
    if (!slotsByDate[dateKey]) slotsByDate[dateKey] = [];
    slotsByDate[dateKey].push(s);
  });

  [0, 1].forEach(weekOffset => {
    const days  = getWeekDays(weekOffset);
    const label = weekOffset === 0 ? '이번 주' : '다음 주';

    const section = document.createElement('div');
    section.className = 'glass rounded-2xl p-3';
    section.innerHTML = `<p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">${label}</p>`;

    // 가로 스크롤 가능한 요일 카드 목록
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;';

    days.forEach((day, i) => {
      const dateKey  = `${day.getFullYear()}-${pad(day.getMonth()+1)}-${pad(day.getDate())}`;
      const daySlots = (slotsByDate[dateKey] || []).sort((a,b) =>
        a.slot_datetime.localeCompare(b.slot_datetime)
      );
      const isToday  = day.toDateString() === new Date().toDateString();

      const card = document.createElement('div');
      card.style.cssText = `min-width:108px;max-width:108px;background:rgba(15,23,42,0.6);border:1.5px solid ${isToday ? '#6366f1' : '#1e293b'};border-radius:14px;padding:8px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;`;

      // 요일/날짜 헤더
      const hdr = document.createElement('div');
      hdr.style.cssText = 'text-align:center;padding-bottom:5px;border-bottom:1px solid #1e293b;';
      hdr.innerHTML = `
        <p style="font-size:10px;color:${isToday ? '#818cf8' : '#64748b'};font-weight:600;">${DAY_KO[i]}</p>
        <p style="font-size:0.9rem;font-weight:800;color:${isToday ? '#818cf8' : '#e2e8f0'};">${day.getDate()}</p>
      `;
      card.appendChild(hdr);

      // 슬롯 리스트
      daySlots.forEach(slot => {
        const resv      = reservationMap[slot.slot_datetime];
        const isPast    = new Date(slot.slot_datetime) < new Date();
        const time      = slot.slot_datetime.substring(11, 16);
        const dur       = slot.duration_minutes || 60;
        const isReserved = slot.status === 'reserved';

        const slotEl = document.createElement('div');
        slotEl.style.cssText = `border-radius:8px;padding:5px 6px;font-size:0.68rem;border:1px solid;`;

        if (resv) {
          // 예약 확정 (미래) — 클릭 시 취소 모달
          slotEl.style.background = 'rgba(99,102,241,0.15)';
          slotEl.style.borderColor = 'rgba(99,102,241,0.4)';
          slotEl.style.cursor = 'pointer';
          slotEl.innerHTML = `
            <div style="font-weight:800;color:#818cf8;">${time}</div>
            <div style="color:#94a3b8;">${dur}분</div>
            <div style="color:#818cf8;font-size:0.6rem;margin-top:2px;">🔒 ${resv.member_name}</div>
          `;
          slotEl.onclick = () => openCancelModal(resv);
        } else if (isReserved || isPast) {
          // 지난 예약 / 과거 슬롯 — 클릭 불가
          slotEl.style.background = 'rgba(30,41,59,0.4)';
          slotEl.style.borderColor = '#1e293b';
          slotEl.innerHTML = `
            <div style="font-weight:700;color:#475569;">${time}</div>
            <div style="color:#334155;">${dur}분</div>
          `;
        } else {
          // 예약 가능 — × 버튼으로 삭제
          slotEl.style.background = 'rgba(16,185,129,0.08)';
          slotEl.style.borderColor = 'rgba(16,185,129,0.3)';
          const delBtn = document.createElement('button');
          delBtn.textContent = '×';
          delBtn.style.cssText = 'position:absolute;top:3px;right:4px;color:#f87171;font-size:0.9rem;background:none;border:none;cursor:pointer;line-height:1;padding:0;';
          delBtn.onclick = (e) => { e.stopPropagation(); deleteSlot(slot.id); };

          slotEl.style.position = 'relative';
          slotEl.innerHTML = `
            <div style="font-weight:800;color:#34d399;padding-right:12px;">${time}</div>
            <div style="color:#94a3b8;">${dur}분</div>
          `;
          slotEl.appendChild(delBtn);
        }
        card.appendChild(slotEl);
      });

      // + 추가 버튼
      const addBtn = document.createElement('button');
      addBtn.style.cssText = 'margin-top:auto;padding:5px 4px;border-radius:7px;border:1px dashed #334155;color:#64748b;font-size:0.72rem;cursor:pointer;background:none;transition:all 0.15s;width:100%;';
      addBtn.textContent = '+ 추가';
      addBtn.onmouseover = () => { addBtn.style.borderColor='#6366f1'; addBtn.style.color='#818cf8'; };
      addBtn.onmouseout  = () => { addBtn.style.borderColor='#334155'; addBtn.style.color='#64748b'; };
      addBtn.onclick = () => openAddSlotModal(dateKey, `${DAY_KO[i]}요일 ${day.getMonth()+1}/${day.getDate()}`);
      card.appendChild(addBtn);

      row.appendChild(card);
    });

    section.appendChild(row);
    container.appendChild(section);
  });
}

// ── SLOT ADD ────────────────────────────────────────────────────
let _selectedDur = 60;
function selectDur(btn, dur) {
  document.querySelectorAll('#durationBtns .dur-btn').forEach(b => b.classList.remove('dur-active'));
  btn.classList.add('dur-active');
  _selectedDur = dur;
  document.getElementById('customDurInput').style.display = dur === 0 ? 'block' : 'none';
}

function openAddSlotModal(dateStr, dayLabel) {
  document.getElementById('addSlotDateStr').value  = dateStr;
  document.getElementById('addSlotDayLabel').textContent = dayLabel;
  document.getElementById('slotHour').value    = '';
  document.getElementById('slotMinute').value  = '';
  document.getElementById('customDurInput').style.display = 'none';
  _selectedDur = 60;
  document.querySelectorAll('#durationBtns .dur-btn').forEach((b,i) => {
    b.classList.toggle('dur-active', b.dataset.dur === '60');
  });
  document.getElementById('addSlotModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('slotHour').focus(), 100);
}

async function submitAddSlot() {
  const dateStr = document.getElementById('addSlotDateStr').value;
  const hourVal   = document.getElementById('slotHour').value.trim();
  const minuteVal  = document.getElementById('slotMinute').value.trim();
  const hour   = hourVal   === '' ? NaN : parseInt(hourVal,   10);
  const minute = minuteVal === '' ? 0   : parseInt(minuteVal, 10);
  let   dur     = _selectedDur === 0
    ? parseInt(document.getElementById('customDurInput').value)
    : _selectedDur;

  if (hourVal === '' || isNaN(hour) || hour < 0 || hour > 23) {
    showToast('⚠ 시간(0~23)을 입력해주세요.', '#f87171'); return;
  }
  if (isNaN(minute) || minute < 0 || minute > 59) {
    showToast('⚠ 분(0~59)을 입력해주세요.', '#f87171'); return;
  }
  if (!dur || dur < 1) { showToast('⚠ 수업 시간을 입력해주세요.', '#f87171'); return; }

  const slot_datetime = `${dateStr}T${pad(hour)}:${pad(minute)}:00`;
  const btn = document.getElementById('addSlotBtn');
  btn.disabled = true; btn.textContent = '추가 중…';

  try {
    const res = await fetch('/api/slots/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ trainer_id: TRAINER_ID, slot_datetime, duration_minutes: dur }),
    });
    const data = await res.json();
    if (!res.ok) { showToast('⚠ ' + (data.error || '추가 실패'), '#f87171'); return; }
    closeModal('addSlotModal');
    showToast(`✅ ${pad(hour)}:${pad(minute)} · ${dur}분 슬롯이 추가되었습니다.`, '#10b981');
    await loadCalendar();
  } catch(e) {
    showToast('오류가 발생했습니다.', '#f87171');
  } finally {
    btn.disabled = false; btn.textContent = '추가';
  }
}

async function deleteSlot(slotId) {
  try {
    const res = await fetch(`/api/slots/delete/${slotId}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) { showToast('⚠ ' + (data.error || '삭제 실패'), '#f87171'); return; }
    showToast('🗑 슬롯이 삭제되었습니다.', '#94a3b8');
    await loadCalendar();
  } catch(e) {
    showToast('오류가 발생했습니다.', '#f87171');
  }
}

// ── MEMBERS ────────────────────────────────────────────────────
async function loadMembers() {
  const res = await fetch(`/api/members/${TRAINER_ID}`);
  const members = await res.json();
  const container = document.getElementById('membersContainer');

  if (!members.length) {
    container.innerHTML = `<div class="glass rounded-xl p-8 text-center text-slate-500 text-sm">
      등록된 회원이 없습니다.<br/>위의 버튼으로 회원을 등록하세요.
    </div>`;
    return;
  }

  // 전화번호 포맷팅 헬퍼 함수
  const formatPhone = (phone) => {
    if (!phone) return '';
    let val = phone.replace(/[^0-9]/g, '');
    if (val.length < 4) return val;
    if (val.length < 8) return val.substr(0, 3) + '-' + val.substr(3);
    return val.substr(0, 3) + '-' + val.substr(3, 4) + '-' + val.substr(7, 4);
  };

  container.innerHTML = members.map(m => {
    const remaining = m.total_sessions - m.used_sessions;
    const pct = Math.round((m.used_sessions / m.total_sessions) * 100) || 0;
    const barColor = remaining <= 2 ? '#f87171' : remaining <= 4 ? '#fbbf24' : '#10b981';
    return `
    <div class="glass rounded-xl p-4 animate-slide-up" id="member-${m.id}">
      <div class="flex items-start justify-between mb-3">
        <div>
          <p class="font-bold text-sm">${m.name}</p>
          <p class="text-xs text-slate-400 mt-0.5">${formatPhone(m.phone)}</p>
        </div>
        <div class="flex gap-1.5">
          <button onclick="openEditMemberModal(${JSON.stringify(m).replace(/"/g,'&quot;')})" class="btn-sm-green">수정</button>
          <button onclick="deleteMember('${m.id}', '${m.name}')" class="btn-danger" style="padding:3px 8px;font-size:0.72rem;">삭제</button>
        </div>
      </div>

      <!-- Session progress bar -->
      <div class="mb-2">
        <div class="flex justify-between text-xs mb-1">
          <span class="text-slate-400">세션 진행</span>
          <span class="font-semibold" style="color:${barColor}">${m.used_sessions} / ${m.total_sessions}회</span>
        </div>
        <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all duration-500" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <p class="text-xs text-right mt-1" style="color:${barColor}">잔여 ${remaining}회</p>
      </div>

      <!-- Quick adjust buttons -->
      <div class="flex items-center gap-2 mt-3 pt-3 border-t border-slate-700">
        <span class="text-xs text-slate-400 flex-1">횟수 조정:</span>
        <button onclick="openAdjustModal('${m.id}', '${m.name}', -1, ${m.used_sessions}, ${m.total_sessions})"
          class="w-8 h-8 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-lg font-bold hover:bg-red-500/20 transition-all"
          title="1회 차감 (확인 필요)"
        >−</button>
        <span class="text-sm font-bold w-6 text-center" id="used-${m.id}">${m.used_sessions}</span>
        <button onclick="openAdjustModal('${m.id}', '${m.name}', +1, ${m.used_sessions}, ${m.total_sessions})"
          class="w-8 h-8 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-lg font-bold hover:bg-emerald-500/20 transition-all"
          title="1회 추가 (확인 필요)"
        >+</button>
      </div>

      <!-- 조정 내역 -->
      <div id="adj-log-${m.id}" style="margin-top:6px;"></div>
    </div>
    `;
  }).join('');

  // 각 회원 조정 내역 로드
  members.forEach(m => loadAdjustLog(m.id));
}

function openAdjustModal(memberId, memberName, delta, currentUsed, total) {
  const newUsed = Math.max(0, Math.min(total, currentUsed + delta));
  const isAdd   = delta > 0;

  document.getElementById('adjustMemberId').value        = memberId;
  document.getElementById('adjustDelta').value           = delta;
  document.getElementById('adjustMemberName').textContent = memberName;
  document.getElementById('adjustIcon').textContent      = isAdd ? '🟢' : '🔴';
  document.getElementById('adjustTitle').textContent     = isAdd ? '세션 1회 추가' : '세션 1회 차감';
  document.getElementById('adjustCountPreview').innerHTML =
    `${currentUsed}회 → <span style="color:${isAdd ? '#34d399' : '#f87171'}">${newUsed}회</span> / ${total}회`;
  document.getElementById('adjustReason').value          = '';
  document.getElementById('adjustModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('adjustReason').focus(), 100);
}

async function submitAdjustSession() {
  const memberId = document.getElementById('adjustMemberId').value;
  const delta    = parseInt(document.getElementById('adjustDelta').value);
  const reason   = document.getElementById('adjustReason').value.trim();
  const btn      = document.getElementById('adjustConfirmBtn');
  btn.disabled = true;
  btn.textContent = '저장 중…';

  try {
    const res = await fetch(`/api/members/${memberId}/adjust`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ delta, reason: reason || null, trainer_id: TRAINER_ID }),
    });
    const updated = await res.json();
    closeModal('adjustModal');
    if (!res.ok) { showToast('⚠ ' + (updated.error || '실패'), '#f87171'); return; }
    showToast(
      delta > 0
        ? `✅ +1 회 추가 (${updated.used_sessions}/${updated.total_sessions})`
        : `✅ −1 회 차감 (${updated.used_sessions}/${updated.total_sessions})`,
      delta > 0 ? '#10b981' : '#94a3b8'
    );
    loadMembers();
  } catch(e) {
    showToast('오류가 발생했습니다.', '#f87171');
  } finally {
    btn.disabled = false;
    btn.textContent = '확인';
  }
}

async function loadAdjustLog(memberId) {
  const el = document.getElementById(`adj-log-${memberId}`);
  if (!el) return;
  try {
    const res  = await fetch(`/api/members/${memberId}/adjustments`);
    const logs = await res.json();
    if (!logs.length) return;
    el.innerHTML = `
      <details style="margin-top:2px;">
        <summary style="font-size:0.72rem;color:#64748b;cursor:pointer;list-style:none;display:flex;align-items:center;gap:4px;">
          📝 조정 내역 ${logs.length}건
        </summary>
        <div style="margin-top:6px;space-y:2px;">
          ${logs.map(l => {
            const dt = new Date(l.created_at);
            const label = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
            return `<div style="font-size:0.72rem;padding:4px 8px;background:rgba(99,102,241,0.06);border-radius:6px;margin-bottom:3px;display:flex;gap:8px;align-items:baseline;">
              <span style="color:${l.delta > 0 ? '#34d399' : '#f87171'};font-weight:700;">${l.delta > 0 ? '+1' : '−1'}</span>
              <span style="color:#64748b;flex:1;">${l.reason || '사유 없음'}</span>
              <span style="color:#475569;white-space:nowrap;">${label}</span>
            </div>`;
          }).join('')}
        </div>
      </details>`;
  } catch(e) {}
}

function openAddMemberModal() {
  document.getElementById('newMemberName').value = '';
  document.getElementById('newMemberPhone').value = '';
  document.getElementById('newMemberTotal').value = '10';
  document.getElementById('newMemberUsed').value = '0';
  document.getElementById('addMemberModal').classList.remove('hidden');
}

async function submitNewMember() {
  const name  = document.getElementById('newMemberName').value.trim();
  const phone = document.getElementById('newMemberPhone').value.trim();
  const total = parseInt(document.getElementById('newMemberTotal').value);
  const used  = parseInt(document.getElementById('newMemberUsed').value);
  if (!name || !phone) { showToast('이름과 전화번호를 입력하세요.', '#f87171'); return; }

  const res = await fetch('/api/members', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ trainer_id: TRAINER_ID, name, phone, total_sessions: total, used_sessions: used }),
  });
  const data = await res.json();
  if (data.error) { showToast('⚠ ' + data.error, '#f87171'); return; }
  closeModal('addMemberModal');
  showToast('✅ 회원이 등록되었습니다!');
  loadMembers();
}

function openEditMemberModal(m) {
  document.getElementById('editMemberId').value    = m.id;
  document.getElementById('editMemberName').value  = m.name;
  document.getElementById('editMemberPhone').value = m.phone;
  document.getElementById('editMemberTotal').value = m.total_sessions;
  document.getElementById('editMemberUsed').value  = m.used_sessions;
  document.getElementById('editMemberModal').classList.remove('hidden');
}

async function submitEditMember() {
  const id    = document.getElementById('editMemberId').value;
  const name  = document.getElementById('editMemberName').value.trim();
  const phone = document.getElementById('editMemberPhone').value.trim();
  const total = parseInt(document.getElementById('editMemberTotal').value);
  const used  = parseInt(document.getElementById('editMemberUsed').value);

  const res = await fetch(`/api/members/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, phone, total_sessions: total, used_sessions: used }),
  });
  const data = await res.json();
  if (data.error) { showToast('⚠ ' + data.error, '#f87171'); return; }
  closeModal('editMemberModal');
  showToast('✅ 수정되었습니다!');
  loadMembers();
}

async function deleteMember(id, name) {
  if (!confirm(`"${name}" 회원을 삭제하시겠습니까?\n관련 예약도 모두 삭제됩니다.`)) return;
  await fetch(`/api/members/${id}`, { method: 'DELETE' });
  showToast('🗑 삭제되었습니다.', '#94a3b8');
  loadMembers();
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.add('hidden'); });
});

// ── RESERVATIONS ───────────────────────────────────────────────
async function loadReservations() {
  const res = await fetch(`/api/reservations/${TRAINER_ID}`);
  const all = await res.json();
  const now = new Date();

  const upcoming = all.filter(r => r.status === 'active' && new Date(r.slot_datetime) >= now);
  const past     = all.filter(r => r.status === 'active' && new Date(r.slot_datetime) < now);
  const cancelled = all.filter(r => r.status === 'cancelled');

  renderReservationList('upcomingContainer', upcoming, true);
  renderReservationList('pastContainer', [...past, ...cancelled], false);
}

function formatDt(iso) {
  const d = new Date(iso);
  const M = d.getMonth()+1, D = d.getDate(), h = d.getHours(), m = d.getMinutes();
  const dayNames = ['일','월','화','수','목','금','토'];
  return `${M}/${D}(${dayNames[d.getDay()]}) ${pad(h)}:${pad(m)}`;
}

// ── TRAINER CANCEL MODAL ─────────────────────────────────
function openCancelModal(resv) {
  document.getElementById('cancelMemberName').textContent = resv.member_name;
  document.getElementById('cancelSlotDate').textContent   = formatDt(resv.slot_datetime);
  document.getElementById('cancelResId').value            = resv.id;
  document.getElementById('cancelReasonInput').value      = '';
  document.getElementById('reopenSlotCheck').checked      = true;
  document.getElementById('cancelResModal').classList.remove('hidden');
}

async function submitTrainerCancel() {
  const resId  = document.getElementById('cancelResId').value;
  const reopen = document.getElementById('reopenSlotCheck').checked;
  const reason = document.getElementById('cancelReasonInput').value.trim();
  const btn    = document.getElementById('trainerCancelBtn');
  btn.disabled = true;
  btn.textContent = '취소 중…';

  try {
    const res = await fetch(`/api/reservations/${resId}?reopen=${reopen}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cancelled_by: 'trainer', cancel_reason: reason || null }),
    });
    const data = await res.json();
    closeModal('cancelResModal');
    if (!res.ok) {
      showToast('⚠ ' + (data.error || '취소 실패'), '#f87171');
      return;
    }
    showToast(
      reopen ? '✅ 취소 완료 — 슬롯이 다시 열렸습니다.' : '✅ 취소 완료 — 슬롯이 닫혀습니다.',
      '#10b981'
    );
    await loadCalendar();
    await loadReservations();
  } catch(e) {
    showToast('오류가 발생했습니다.', '#f87171');
  } finally {
    btn.disabled = false;
    btn.textContent = '취소 확정';
  }
}

function renderReservationList(containerId, list, showCancel) {
  const el = document.getElementById(containerId);
  if (!list.length) {
    el.innerHTML = `<div class="text-slate-600 text-sm text-center py-4">예약 내역이 없습니다.</div>`;
    return;
  }
  el.innerHTML = list.map(r => {
    const isCancelled = r.status === 'cancelled';
    const byTrainer   = r.cancelled_by === 'trainer';
    const byMember    = r.cancelled_by === 'member';

    const cancelInfo = isCancelled ? `
      <div style="margin-top:8px;padding:8px 10px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.15);border-radius:8px;">
        <p style="font-size:0.72rem;font-weight:700;color:#f87171;margin-bottom:${r.cancel_reason ? '4px' : '0'};">
          ${byTrainer ? '🔴 강사 취소' : byMember ? '🗒️ 회원 취소' : '취소됨'}
        </p>
        ${r.cancel_reason
          ? `<p style="font-size:0.75rem;color:#94a3b8;line-height:1.45;">"${r.cancel_reason}"</p>`
          : ''}
      </div>` : '';

    return `
    <div class="glass rounded-xl p-3.5 animate-slide-up">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <p class="font-semibold text-sm">${r.member_name}</p>
          <p class="text-xs text-slate-400 mt-0.5">${formatDt(r.slot_datetime)}</p>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge ${r.status === 'active' ? 'badge-green' : 'badge-gray'}">
            ${r.status === 'active' ? '예약 확정' : '취소됨'}
          </span>
          ${showCancel && r.status === 'active'
            ? `<button
                 onclick='openCancelModal(${JSON.stringify(r)})'
                 style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f87171;border-radius:8px;padding:4px 10px;font-size:0.72rem;font-weight:600;cursor:pointer;"
               >취소</button>`
            : ''}
        </div>
      </div>
      ${cancelInfo}
    </div>
  `}).join('');
}


// ── INIT ───────────────────────────────────────────────────────
loadCalendar();
</script>

<script>
// 전화번호 자동 하이픈
function autoHyphen(target) {
  let val = target.value.replace(/[^0-9]/g, '');
  if(val.length < 4) { target.value = val; return; }
  if(val.length < 8) { target.value = val.substr(0,3) + '-' + val.substr(3); return; }
  target.value = val.substr(0,3) + '-' + val.substr(3,4) + '-' + val.substr(7,4);
}
</script>
